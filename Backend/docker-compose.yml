version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inventory_db
      JWT_SECRET_KEY: change-this-in-prod
      UPLOAD_FOLDER: uploads/
      FLASK_DEBUG: "false"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

volumes:
  postgres_data: